name: Publish

"on":
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: api
            context: .
            dockerfile: src/EnterpriseFlow.Api/Dockerfile
          - image: web
            context: ./src/EnterpriseFlow.Web
            dockerfile: ./src/EnterpriseFlow.Web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN only — GHCR needs no external account/secret, same reasoning that already
      # picked CodeQL over SonarCloud and Dependabot over Renovate in Release 4 (nothing this
      # environment doesn't already have).
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/enterpriseflow-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
