# Mirrors vite.config.ts's dev proxy: the browser only ever talks to this one origin, and /api/*
# is forwarded server-side to the api container over the compose network — same reasoning as
# dev (no CORS needed, the refresh-token cookie's Path=/api/auth scopes correctly either way
# since neither proxy sets an explicit cookie Domain).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Release 4, Sprint 8 (F7.9 hardening audit): EnterpriseFlow.Api.Middleware.SecurityHeadersMiddleware
    # covers the JSON API by design (its own comment says so explicitly) but never the actual
    # HTML/JS the browser renders — this is the real gap, so headers here are tuned for an SPA
    # instead of copy-pasted from the API's strict JSON CSP. style-src needs 'unsafe-inline'
    # because Vuetify's theme plugin (src/plugins/vuetify.ts) injects a <style id="vuetify-theme-stylesheet">
    # tag at runtime with no CSP nonce wiring in this stack; script-src stays 'self' since the
    # Vite build emits no inline scripts. No third-party origins anywhere in src/ (verified via
    # grep for http(s):// literals), so connect-src/img-src/font-src all stay 'self'.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Release 2, F6.1 (ADR-0011): SignalR's connection needs its own block, not just /api/ — a
    # plain reverse proxy doesn't upgrade to WebSocket on its own (same reason vite.config.ts
    # needs a separate `ws: true` proxy entry for dev, see r2-08c-frontend-notificaciones.md).
    location /hubs/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue Router uses createWebHistory() (HTML5 history mode, src/router/index.ts) — without
    # this fallback, refreshing on any non-root route (e.g. /login) would 404 directly against
    # nginx instead of loading the SPA shell and letting the router take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
